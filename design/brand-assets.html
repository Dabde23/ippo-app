<!DOCTYPE html>

<title>いっぽ — ブランドアセット v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Yusei+Magic&display=swap');

  :root {
    --terra:      #C4623A;
    --terra-dark: #A04D2C;
    --terra-light:#D4845E;
    --brown:      #2C1F14;
    --cream:      #F7F3EE;
    --muted:      #9B8478;
    --line:       #DDD5CC;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #E8E2D9;
    font-family: 'BIZ UDPGothic', sans-serif;
    color: var(--brown);
    min-height: 100vh;
    padding: 48px 32px;
  }

  h1 { font-size: 13px; letter-spacing: 0.25em; color: #9B8478; margin-bottom: 48px; font-weight: 400; }

  .section { margin-bottom: 64px; }
  .section-label {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    color: #9B8478; margin-bottom: 24px; font-weight: 400;
  }
  .asset-row { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; }

  .asset-card {
    background: #FAF7F3; border-radius: 16px; padding: 32px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .asset-card.dark { background: #2C1F14; }
  .asset-card label { font-size: 10px; letter-spacing: 0.2em; color: #9B8478; text-transform: uppercase; }
  .asset-card.dark label { color: #B09070; }

  .app-icon-svg { width: 180px; height: 180px; }
  .splash-svg {
    width: 260px; height: 560px; border-radius: 32px; overflow: hidden;
    box-shadow: 0 24px 64px rgba(44,31,20,0.2);
  }
  .hint { font-size: 12px; color: #9B8478; margin-top: 12px; line-height: 1.8; }
</style>
</head>
